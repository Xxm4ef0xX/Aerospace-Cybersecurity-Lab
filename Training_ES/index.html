<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0E1A">
<title>SATCOM · Curso de seguridad satelital</title>
<style>
:root{
  --bg:#0A0E1A; --panel:#121829; --panel-2:#0F1422; --line:#212a40; --line-soft:#1a2136;
  --ink:#E8ECF6; --ink-2:#9AA6C2; --ink-3:#5f6b87;
  --signal:#54E0C7; --signal-dim:#1e5049; --signal-ink:#0A0E1A;
  --amber:#F2B45A; --amber-dim:#4a3617;
  --red:#F07575; --red-dim:#452020;
  --disp:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; --body:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
a{color:var(--signal)}

/* ===== star field ===== */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5}
.stars::before,.stars::after{content:"";position:absolute;inset:0;
  background-image:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 60%,#cfe,transparent),radial-gradient(1px 1px at 40% 80%,#fff,transparent),radial-gradient(1px 1px at 85% 20%,#bdf,transparent),radial-gradient(1px 1px at 55% 45%,#fff,transparent),radial-gradient(1px 1px at 10% 65%,#cff,transparent);
  background-repeat:repeat;background-size:400px 400px}
.stars::after{background-size:250px 250px;opacity:.4}

/* ===== header ===== */
header{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:12px 18px;background:rgba(10,14,26,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{width:30px;height:30px;flex-shrink:0;position:relative}
.logo svg{width:100%;height:100%}
.brand-txt{min-width:0}
.brand-txt .k{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--signal);text-transform:uppercase}
.brand-txt .t{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hspacer{flex:1}
.ring{display:flex;align-items:center;gap:10px}
.ring svg{width:38px;height:38px;transform:rotate(-90deg)}
.ring .pct{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--signal)}
.ring .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase}
.menu-btn{display:none;background:transparent;border:1px solid var(--line);color:var(--ink);
  width:38px;height:38px;border-radius:8px;font-size:17px;cursor:pointer;align-items:center;justify-content:center}
.menu-btn:active{background:var(--panel)}

/* ===== shell ===== */
.shell{position:relative;z-index:1;display:grid;grid-template-columns:288px 1fr;max-width:1240px;margin:0 auto;min-height:calc(100vh - 55px)}

/* ===== nav ===== */
nav{border-right:1px solid var(--line);padding:20px 12px 60px;overflow-y:auto}
.nav-head{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--ink-3);text-transform:uppercase;padding:0 8px 4px}
.mod{margin-top:20px}
.mod-t{display:flex;align-items:baseline;gap:8px;font-family:var(--disp);font-size:12.5px;font-weight:600;
  color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em;padding:0 8px 8px}
.mod-t .idx{font-family:var(--mono);font-size:10px;color:var(--signal);font-weight:500}
.les{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:0;
  color:var(--ink-2);font-family:var(--body);font-size:13.5px;padding:8px 10px;border-radius:8px;cursor:pointer;line-height:1.35}
.les:hover{background:var(--panel);color:var(--ink)}
.les.active{background:var(--panel);color:var(--ink)}
.les.active .node{border-color:var(--signal);background:var(--signal)}
.node{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;transition:.2s}
.les.done .node{background:var(--signal);border-color:var(--signal);box-shadow:0 0 8px var(--signal-dim)}
.les .num{font-family:var(--mono);font-size:10px;color:var(--ink-3);flex-shrink:0}

/* ===== main ===== */
main{padding:34px 42px 90px;min-width:0;max-width:820px}
.crumb{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
.desig{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;
  padding:5px 11px;border-radius:6px;background:var(--panel);border:1px solid var(--line);color:var(--signal);margin-bottom:18px}
.desig .dot{width:6px;height:6px;border-radius:50%;background:var(--signal)}
h1{font-family:var(--disp);font-weight:600;font-size:29px;line-height:1.15;letter-spacing:-.01em;margin-bottom:18px}
.body p{color:var(--ink);margin-bottom:15px;font-size:15.5px}
.body ul{list-style:none;margin:6px 0 18px}
.body li{position:relative;padding-left:22px;margin-bottom:9px;color:var(--ink-2);font-size:15px}
.body li::before{content:"▸";position:absolute;left:2px;color:var(--signal);font-size:12px;top:1px}
.body b{color:var(--ink);font-weight:600}
.body em{color:var(--ink-2);font-style:italic}

/* callouts */
.call{display:flex;gap:12px;padding:14px 16px;border-radius:10px;margin:18px 0;font-size:14px;line-height:1.55;border:1px solid var(--line)}
.call .ic{font-family:var(--mono);font-size:16px;flex-shrink:0;line-height:1.3}
.call.info{background:var(--panel-2);border-color:var(--line)}
.call.info .ic{color:var(--signal)}
.call.warn{background:linear-gradient(0deg,var(--amber-dim),var(--panel-2));border-color:#5a4526}
.call.warn .ic{color:var(--amber)}
.call.def{background:linear-gradient(0deg,var(--signal-dim),var(--panel-2));border-color:#2b5c53}
.call.def .ic{color:var(--signal)}
.call .lead{font-weight:600;color:var(--ink)}

/* kill-chain table */
.kc{margin:18px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.kc-cap{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--amber);padding:10px 14px;background:var(--amber-dim);border-bottom:1px solid #5a4526}
.kc-row{display:grid;grid-template-columns:118px 1fr 1fr;border-bottom:1px solid var(--line-soft)}
.kc-row:last-child{border-bottom:0}
.kc-row .ph{font-family:var(--mono);font-size:11px;color:var(--signal);padding:12px 14px;background:var(--panel-2);border-right:1px solid var(--line-soft);letter-spacing:.03em}
.kc-row .c{padding:12px 14px;font-size:13.5px;color:var(--ink-2);border-right:1px solid var(--line-soft)}
.kc-row .c:last-child{border-right:0}
.kc-hd .ph,.kc-hd .c{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);background:var(--panel);padding:9px 14px}

/* quiz */
.quiz{margin:24px 0 4px;padding:18px;border:1px solid var(--line);border-radius:12px;background:var(--panel-2)}
.quiz-k{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--signal);margin-bottom:10px}
.quiz-q{font-weight:600;font-size:15px;margin-bottom:14px;color:var(--ink)}
.opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);font-family:var(--body);font-size:14px;padding:11px 14px;border-radius:9px;margin-bottom:9px;cursor:pointer;transition:.15s}
.opt:hover:not(:disabled){border-color:var(--ink-3)}
.opt .tag{font-family:var(--mono);font-size:11px;color:var(--ink-3);width:16px;flex-shrink:0}
.opt.correct{border-color:var(--signal);background:var(--signal-dim)}
.opt.correct .tag{color:var(--signal)}
.opt.wrong{border-color:var(--red);background:var(--red-dim)}
.opt.wrong .tag{color:var(--red)}
.opt:disabled{cursor:default}
.fb{display:flex;gap:9px;margin-top:12px;font-size:13.5px;color:var(--ink-2);line-height:1.5}
.fb .ic{color:var(--signal);font-family:var(--mono)}

/* nav buttons */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:34px;padding-top:22px;border-top:1px solid var(--line)}
.pg{display:inline-flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  font-family:var(--disp);font-weight:500;font-size:14px;padding:11px 18px;border-radius:9px;cursor:pointer;transition:.15s}
.pg:hover:not(:disabled){border-color:var(--signal);color:var(--signal)}
.pg:disabled{opacity:.35;cursor:not-allowed}
.pg.next{background:var(--signal);color:var(--signal-ink);border-color:var(--signal)}
.pg.next:hover{filter:brightness(1.08);color:var(--signal-ink)}

/* overlay for mobile drawer */
.scrim{display:none;position:fixed;inset:0;background:rgba(5,8,15,.6);z-index:35;backdrop-filter:blur(2px)}

@media(max-width:820px){
  .shell{grid-template-columns:1fr}
  .menu-btn{display:flex}
  nav{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:84vw;background:var(--panel-2);z-index:38;
    transform:translateX(-100%);transition:transform .25s ease;padding-top:74px;border-right:1px solid var(--line)}
  nav.open{transform:translateX(0)}
  .scrim.show{display:block}
  main{padding:26px 20px 80px}
  h1{font-size:24px}
  .kc-row{grid-template-columns:1fr}
  .kc-row .ph{border-right:0;border-bottom:1px solid var(--line-soft)}
  .kc-row .c{border-right:0}
  .kc-hd{display:none}
  .brand-txt .t{font-size:14px}
}
</style>
</head>
<body>
<div class="stars" aria-hidden="true"></div>

<header>
  <button class="menu-btn" id="menuBtn" aria-label="Abrir el índice del curso">☰</button>
  <div class="brand">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 40 40" fill="none">
        <ellipse cx="20" cy="20" rx="17" ry="7" stroke="#54E0C7" stroke-width="1.3" opacity=".55" transform="rotate(-24 20 20)"/>
        <circle cx="20" cy="20" r="5.5" fill="#121829" stroke="#54E0C7" stroke-width="1.4"/>
        <circle cx="20" cy="20" r="1.8" fill="#54E0C7"/>
        <circle cx="34.5" cy="13.5" r="2.1" fill="#54E0C7"/>
      </svg>
    </div>
    <div class="brand-txt">
      <div class="k">Ground Station</div>
      <div class="t">Seguridad satelital</div>
    </div>
  </div>
  <div class="hspacer"></div>
  <div class="ring" title="Progreso del curso">
    <svg viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="16" fill="none" stroke="#212a40" stroke-width="3.5"/>
      <circle id="ringFill" cx="20" cy="20" r="16" fill="none" stroke="#54E0C7" stroke-width="3.5"
        stroke-linecap="round" stroke-dasharray="100.5" stroke-dashoffset="100.5"/>
    </svg>
    <div>
      <div class="pct" id="pctTxt">0%</div>
      <div class="lab" id="cntTxt">0 / 0</div>
    </div>
  </div>
</header>

<div class="scrim" id="scrim"></div>

<div class="shell">
  <nav id="nav" aria-label="Índice del curso"></nav>
  <main id="main"></main>
</div>

<script>
const course = [
{title:"Fundamentos", code:"FND", lessons:[
 {id:"basics", des:"FND-01", title:"Conceptos básicos de satélites", body:`<p>Un satélite es un objeto que orbita la Tierra para cumplir funciones de comunicación, observación, navegación o investigación. Todo el análisis de amenazas de este curso parte de entender qué hace cada pieza y quién puede alcanzarla.</p>`},
 {id:"space-systems", des:"FND-02", title:"Sistemas espaciales", body:`<p>Un sistema espacial completo tiene tres segmentos que interactúan constantemente:</p><ul><li><b>Segmento espacial:</b> el satélite en órbita.</li><li><b>Segmento terrestre:</b> estaciones de control y recepción (TT&C).</li><li><b>Segmento de usuario:</b> los terminales que consumen el servicio.</li></ul>`},
 {id:"ground", des:"FND-03", title:"Segmento terrestre", body:`<p>Incluye estaciones de seguimiento, telemetría y control (TT&C), centros de operación de misión y las antenas que envían comandos y reciben datos. Es el plano donde se concentra el control operativo — y por eso un objetivo de alto valor en cualquier modelo de amenaza.</p>`},
 {id:"user", des:"FND-04", title:"Segmento de usuario", body:`<p>Terminales VSAT, módems de banda ancha, receptores GPS, teléfonos satelitales. Es la superficie de exposición más amplia porque está dispersa, es numerosa y muchas veces menos protegida que el propio satélite o la estación terrestre.</p>`},
 {id:"types", des:"FND-05", title:"Tipos de satélites por órbita", body:`<p>La altitud orbital condiciona la latencia y el modelo de amenaza:</p><ul><li><b>LEO</b> (~500–2000 km): Starlink, observación terrestre.</li><li><b>MEO</b> (~2000–35000 km): GPS, GLONASS.</li><li><b>GEO</b> (35786 km): comunicaciones fijas, meteorología, Viasat.</li></ul>`,
 quiz:{q:"¿Qué segmento representa la mayor superficie de exposición a ataques?", opts:["El segmento espacial","El segmento de usuario","El lanzador"], correct:1, fb:"Los terminales de usuario están dispersos, son numerosos y suelen estar menos protegidos que el satélite o la estación terrestre."}}
]},
{title:"Órbitas y dinámica", code:"ORB", lessons:[
 {id:"orb-elements", des:"ORB-01", title:"Elementos orbitales y TLE", body:`<p>La órbita de un satélite se describe con seis <b>elementos keplerianos</b> (semieje mayor, excentricidad, inclinación, ascensión recta del nodo, argumento del perigeo y anomalía). En la práctica, esta información se distribuye públicamente en formato <b>TLE</b> (Two-Line Element set).</p>`,
 call:{type:"info", lead:"Relevancia de seguridad:", txt:"Los TLE son públicos: cualquiera puede predecir cuándo un satélite pasará sobre un punto. Es la materia prima del reconocimiento (recon) tanto para un operador legítimo como para un adversario."}},
 {id:"orb-regimes", des:"ORB-02", title:"Regímenes orbitales", body:`<p>Más allá de LEO/MEO/GEO, hay órbitas con propiedades de seguridad distintas:</p><ul><li><b>LEO:</b> baja latencia, pases cortos y frecuentes, muchos contactos → más ventanas para interactuar con el enlace.</li><li><b>GEO:</b> el satélite parece fijo; una antena apuntada permite contacto continuo.</li><li><b>HEO / Molniya:</b> órbitas elípticas que dan cobertura prolongada sobre latitudes altas.</li></ul><p>La huella terrestre (ground track) y el periodo de revisita condicionan cuándo y desde dónde un enlace es alcanzable.</p>`},
 {id:"orb-passes", des:"ORB-03", title:"Ventanas de contacto y Doppler", body:`<p>Un satélite LEO solo es visible desde una estación durante unos minutos por pase. Los momentos clave son <b>AOS</b> (adquisición de señal) y <b>LOS</b> (pérdida de señal). Durante el pase, el movimiento relativo produce <b>desplazamiento Doppler</b>: la frecuencia recibida se corre y debe compensarse.</p>`,
 call:{type:"def", lead:"Conexión con RF y recon:", txt:"El Doppler enlaza este módulo con RF: un receptor debe seguir el corrimiento de frecuencia para demodular. Y las ventanas de contacto son justo lo que herramientas como Gpredict calculan en el módulo de reconocimiento."},
 quiz:{q:"¿Por qué los TLE públicos son relevantes para la seguridad?", opts:["Contienen las claves de cifrado del satélite","Permiten predecir cuándo y desde dónde un satélite es alcanzable","Apagan el satélite remotamente"], correct:1, fb:"Un TLE permite calcular pases y ventanas de contacto: es la base del reconocimiento para operadores y adversarios por igual."}}
]},
{title:"RF y SATCOM", code:"RF", lessons:[
 {id:"rf-basics", des:"RF-01", title:"Fundamentos de radiofrecuencia", body:`<p>Toda comunicación satelital viaja como ondas electromagnéticas. Tres parámetros definen una señal: <b>frecuencia</b> (oscilaciones por segundo, en Hz), <b>longitud de onda</b> (inversamente proporcional a la frecuencia) y <b>amplitud</b>. A mayor frecuencia, más ancho de banda disponible pero mayor atenuación por lluvia y obstáculos.</p><ul><li><b>Propagación:</b> la señal se debilita con la distancia y con el clima (rain fade en bandas altas).</li><li><b>Línea de vista:</b> los enlaces satelitales requieren visibilidad directa entre antena y satélite.</li></ul>`,
 call:{type:"info", lead:"Por qué importa en seguridad:", txt:"Entender propagación y línea de vista es la base para razonar sobre interferencia, cobertura de un jammer o desde dónde un adversario podría recibir o inyectar señal."}},
 {id:"rf-bands", des:"RF-02", title:"Bandas de frecuencia satelital", body:`<p>Las comunicaciones satelitales se reparten en bandas, cada una con compromisos distintos entre ancho de banda, tamaño de antena y resistencia al clima:</p><ul><li><b>L (1–2 GHz):</b> GPS/GNSS, teléfonos satelitales. Robusta, poco ancho de banda.</li><li><b>S (2–4 GHz):</b> telemetría (TT&C), algunos LEO.</li><li><b>C (4–8 GHz):</b> comunicaciones fijas, resistente a la lluvia.</li><li><b>X (8–12 GHz):</b> uso militar y gubernamental.</li><li><b>Ku (12–18 GHz):</b> TV satelital, VSAT.</li><li><b>Ka (26–40 GHz):</b> banda ancha de alta capacidad (Starlink, Viasat), sensible a rain fade.</li></ul>`},
 {id:"rf-mod", des:"RF-03", title:"Modulación digital", body:`<p>La modulación codifica los datos sobre la portadora de RF. Los esquemas más comunes en SATCOM:</p><ul><li><b>BPSK / QPSK:</b> robustos, usados cuando la relación señal-ruido es baja.</li><li><b>8PSK / QAM (16/32/64):</b> transportan más bits por símbolo, pero exigen mejor calidad de enlace.</li></ul><p>El estándar <b>DVB-S2/S2X</b> ajusta modulación y codificación dinámicamente según las condiciones del enlace (ACM, modulación y codificación adaptativa).</p>`},
 {id:"rf-link", des:"RF-04", title:"Presupuesto de enlace (link budget)", body:`<p>El link budget es la contabilidad de todas las ganancias y pérdidas entre el transmisor y el receptor. Determina si un enlace es viable. Componentes clave:</p><ul><li><b>EIRP:</b> potencia efectiva radiada del transmisor.</li><li><b>Pérdida de trayecto (path loss):</b> atenuación por la distancia.</li><li><b>G/T:</b> figura de mérito del receptor (ganancia de antena frente a ruido).</li><li><b>SNR / Eb/N0:</b> relación señal-ruido resultante; define si se puede demodular.</li><li><b>Margen de desvanecimiento (fade margin):</b> reserva para clima y variaciones.</li></ul>`,
 call:{type:"info", lead:"Ángulo defensivo:", txt:"Un ataque de jamming busca justamente degradar la SNR del enlace legítimo por debajo del umbral demodulable. Entender el link budget es entender cuánta potencia interferente haría falta y qué margen protege al enlace."},
 quiz:{q:"¿Qué mide fundamentalmente un presupuesto de enlace (link budget)?", opts:["El coste económico del satélite","Si la señal llega con suficiente calidad (SNR) para ser demodulada","La órbita del satélite"], correct:1, fb:"El link budget suma ganancias y resta pérdidas para determinar la relación señal-ruido en el receptor, y con ella si el enlace es viable."}},
 {id:"rf-arch", des:"RF-05", title:"Arquitectura SATCOM", body:`<p>Un satélite de comunicaciones recibe, amplifica y retransmite señales mediante <b>transpondedores</b>. El acceso al canal se reparte entre múltiples usuarios con esquemas de multiplexación:</p><ul><li><b>FDMA:</b> división por frecuencia.</li><li><b>TDMA:</b> división por tiempo (ranuras).</li><li><b>CDMA:</b> división por código.</li></ul><p>Los satélites modernos usan cargas útiles procesadas y haces puntuales (spot beams) que reutilizan frecuencias en zonas geográficas distintas para multiplicar capacidad.</p>`},
 {id:"rf-ccsds", des:"RF-06", title:"Estándares CCSDS y SDLS", body:`<p>El <b>CCSDS</b> (Consultative Committee for Space Data Systems) define los estándares que la mayoría de agencias y operadores usan para telemetría y telecomando espacial. Para seguridad, el estándar central es <b>SDLS</b> (Space Data Link Security), que provee autenticación y cifrado a nivel de enlace de datos.</p>`,
 call:{type:"def", lead:"Conexión con los casos de estudio:", txt:"La \"autenticación de comandos\" que rompe la cadena de ataque en Viasat y otros casos se implementa en el mundo real precisamente con estándares como SDLS. Conocer el estándar es conocer el control."},
 quiz:{q:"¿Qué proporciona el estándar CCSDS SDLS?", opts:["Mayor ancho de banda","Autenticación y cifrado a nivel de enlace de datos espacial","Un nuevo tipo de órbita"], correct:1, fb:"SDLS es el estándar que implementa autenticación e integridad en los enlaces de comando y telemetría — el control concreto detrás de la lección repetida del curso."}}
]},
{title:"Segmento espacial", code:"SPC", lessons:[
 {id:"subsystems", des:"SPC-01", title:"Subsistemas del satélite", body:`<p>Un satélite integra subsistemas que deben coordinarse:</p><ul><li>Potencia (paneles solares, baterías)</li><li>Control de actitud y órbita (ADCS)</li><li>Telemetría, seguimiento y comando (TT&C)</li><li>Carga útil (payload): la función principal</li><li>Gestión térmica y propulsión</li></ul>`},
 {id:"onboard", des:"SPC-02", title:"Arquitectura de a bordo", body:`<p>El computador de a bordo (OBC) ejecuta el software de vuelo, a menudo sobre RTOS como VxWorks o RTEMS, elegidos por determinismo y bajo consumo, no por seguridad ofensiva.</p>`,
 call:{type:"info", lead:"Nota de modelado:", txt:"Los ciclos de parcheo en órbita son muy largos y arriesgados. En un ejercicio de threat modeling, identifica aquí qué activos son de misión crítica y cuáles tolerarían degradación temporal."},
 quiz:{q:"¿Por qué es difícil parchear un satélite ya en órbita?", opts:["No tienen software","Recursos limitados, ciclos largos y riesgo de dejarlo inoperable","Usan Windows"], correct:1, fb:"Las actualizaciones remotas en el espacio son costosas y arriesgadas, así que el diseño seguro desde el inicio importa mucho más que en sistemas terrestres."}}
]},
{title:"SIGINT y SDR", code:"SIG", lessons:[
 {id:"sdr", des:"SIG-01", title:"Herramientas SDR", body:`<p>Un SDR (radio definida por software) permite recibir y analizar señales por software en lugar de hardware dedicado. Uso legítimo: monitoreo de espectro, radioafición y recepción de transmisiones públicas no cifradas.</p>`,
 call:{type:"warn", lead:"Límite legal:", txt:"Interceptar comunicaciones privadas o cifradas sin autorización es ilegal en la mayoría de jurisdicciones, sin importar la herramienta usada."}},
 {id:"gnuradio", des:"SIG-02", title:"GNU Radio", body:`<p>Framework abierto para procesar señales SDR mediante bloques encadenables (filtros, demoduladores, decodificadores). Es la base de muchas herramientas de recepción satelital legítima.</p>`},
 {id:"satdump", des:"SIG-03", title:"SatDump y señales públicas", body:`<p>SatDump decodifica transmisiones satelitales públicas, como imágenes APT de satélites meteorológicos NOAA que emiten en abierto por diseño. Pipeline: recepción → demodulación → decodificación → imagen.</p>`},
 {id:"satnogs", des:"SIG-04", title:"SatNogs", body:`<p>Red global y abierta de estaciones terrestres operadas por voluntarios, usada para seguimiento y recepción colaborativa de satélites, principalmente CubeSats académicos.</p>`,
 quiz:{q:"¿Cuál es el uso legítimo típico de un SDR en el contexto satelital?", opts:["Interceptar comunicaciones cifradas ajenas","Recibir transmisiones públicas no cifradas","Tomar control de un satélite militar"], correct:1, fb:"Muchos satélites meteorológicos transmiten datos abiertos por diseño; ese es el caso de uso legítimo y educativo del SDR."}}
]},
{title:"Casos: cadena de ataque", code:"ATK", lessons:[
 {id:"frameworks", des:"ATK-01", title:"Analizar incidentes como red teamer", body:`<p>Este módulo estudia incidentes reales construyendo un modelo de amenaza: qué fase de la cadena de ataque (kill chain) se explotó y por qué, a nivel conceptual, sin procedimientos replicables. El objetivo es dar vocabulario común a equipos rojo y azul en engagements autorizados.</p>`},
 {id:"viasat", des:"ATK-02", title:"Caso: Viasat KA-SAT (2022)", body:`<p>Un ataque afectó la red de módems KA-SAT de Viasat en Europa en 2022, interrumpiendo el servicio a decenas de miles de usuarios, incluidos sistemas de monitoreo de turbinas eólicas.</p>`,
 kc:{cap:"Cadena de ataque · nivel conceptual", rows:[
   ["Reconocimiento","Identificación de la arquitectura de gestión remota de la red de módems.","Documentación y configuración de gestión expuestas más allá de lo necesario."],
   ["Acceso inicial","Aprovechamiento de una VPN de gestión mal segmentada.","Plano de gestión no aislado de la red operativa."],
   ["Impacto","Comandos que inutilizaron módems a gran escala.","Autenticación débil y sin límite de radio de acción en el plano de comando."]
 ]},
 call:{type:"def", lead:"Lección para threat modeling:", txt:"Todo plano de gestión remota de terminales debe tratarse como activo crítico con segmentación estricta y autenticación de comandos — el control que habría roto esta cadena en el acceso inicial."}},
 {id:"starlink", des:"ATK-03", title:"Caso: resiliencia DDoS en LEO (Starlink)", body:`<p>Las constelaciones LEO de gran escala son objetivo potencial de denegación de servicio contra su plano terrestre o de usuario. Lo analizamos desde el modelado de amenaza: qué se busca agotar y qué control lo rompe.</p>`,
 kc:{cap:"Cadena de ataque · nivel conceptual", rows:[
   ["Reconocimiento","Mapeo de puntos de concentración de tráfico: estaciones puerta de enlace (gateways).","Cuellos de botella conocidos en el enlace terrestre–satélite."],
   ["Ejecución","Volumen de tráfico anómalo dirigido a esos puntos.","Ausencia de límites de tasa adaptativos en el borde."],
   ["Impacto","Degradación del servicio para usuarios legítimos.","Falta de aislamiento entre tráfico legítimo y anómalo en tiempo real."]
 ]},
 call:{type:"def", lead:"Lección para threat modeling:", txt:"Los gateways son el activo a modelar como objetivo de agotamiento de recursos; el control que rompe la cadena es detección de anomalías en tiempo real con rate limiting adaptativo."}},
 {id:"dozor", des:"ATK-04", title:"Caso: Dozor-Teleport", body:`<p>Ilustra cómo la falta de controles de acceso en infraestructura de teleobservación puede exponer datos operacionales sensibles. La lección es sobre gobernanza de accesos, no sobre técnica de intrusión.</p>`,
 kc:{cap:"Cadena de ataque · nivel conceptual", rows:[
   ["Reconocimiento","Infraestructura de teleobservación con controles de acceso débiles.","Interfaces de gestión sin segmentación adecuada."],
   ["Acceso inicial","Controles de autenticación/autorización insuficientes.","Falta de gobernanza de accesos y revisión de permisos."],
   ["Exfiltración","Acceso a datos operacionales sensibles.","Ausencia de monitoreo de acceso anómalo a datos de misión."]
 ]}},
 {id:"obscurity", des:"ATK-05", title:"Seguridad por oscuridad", body:`<p>Confiar en que un protocolo propietario es "seguro" por ser poco documentado ha fallado repetidamente: basta un actor motivado que dedique tiempo a la ingeniería inversa. Los controles reales que lo reemplazan son cifrado extremo a extremo, autenticación de comandos y monitoreo continuo — los mismos tres que reaparecen en cada caso anterior.</p>`},
 {id:"recon", des:"ATK-06", title:"Reconocimiento (OSINT) propio", body:`<p>Un engagement autorizado empieza igual que lo haría un adversario: recopilando lo público sobre el objetivo — efemérides orbitales (TLE), frecuencias registradas, documentación de proveedores. El valor para el cliente es que el equipo defensor vea esa misma superficie y decida qué reducir.</p><ul><li><b>Gpredict:</b> seguimiento orbital en tiempo real desde TLE públicos.</li><li><b>Lab Gpredict:</b> calcular la próxima ventana de paso visible de un satélite conocido.</li></ul>`,
 quiz:{q:"En un lab de detección de DDoS, ¿cuál es un indicador típico de ataque volumétrico?", opts:["Tráfico estable y uniforme todo el día","Picos súbitos concentrados en pocos orígenes","Bajo uso de CPU en los servidores"], correct:1, fb:"Los picos súbitos y concentrados son la señal clásica que buscan los sistemas de detección de anomalías."}}
]},
{title:"Terrestre y protocolos", code:"GND", lessons:[
 {id:"link", des:"GND-01", title:"Riesgos en enlaces de comunicación", body:`<p>Los enlaces entre segmento terrestre y espacial son vulnerables conceptualmente a tres categorías cuando no están cifrados y autenticados de extremo a extremo: interferencia (jamming), suplantación (spoofing) e intercepción.</p>`},
 {id:"sle", des:"GND-02", title:"Protocolo SLE (Space Link Extension)", body:`<p>SLE coordina el intercambio de datos entre estaciones terrestres y misiones. Para threat modeling, las categorías de riesgo son: autenticación de sesión insuficiente, ausencia de validación de secuencia de comandos y logging incompleto de eventos de sesión.</p>`,
 call:{type:"def", lead:"Lab asociado (detección):", txt:"Dado un log de sesión SLE simulado, identificar comandos fuera de secuencia, fallos de autenticación repetidos y orígenes no autorizados. No incluye ejecución de comandos contra sistemas reales."},
 quiz:{q:"En el lab de monitoreo SLE, ¿qué buscarías en los logs de sesión?", opts:["Comandos fuera de secuencia y fallos de autenticación repetidos","El color de la interfaz","La velocidad de internet del operador"], correct:0, fb:"Esas anomalías son las señales típicas de un intento de manipulación del enlace — lo primero que revisaría un analista."}}
]},
{title:"Amenazas de capa física", code:"PHY", lessons:[
 {id:"phy-intro", des:"PHY-01", title:"La capa física como superficie de ataque", body:`<p>A diferencia de los ataques a software o protocolos, las amenazas de capa física atacan la señal de RF misma. No requieren acceso a la red: basta con emitir energía en la frecuencia correcta desde dentro del alcance. Son especialmente relevantes en satélites porque el enlace es inherentemente abierto y difícil de blindar.</p><p>Este módulo las trata a nivel conceptual y defensivo: qué son, cómo se manifiestan y cómo se detectan, sin procedimientos de ejecución.</p>`},
 {id:"phy-jamming", des:"PHY-02", title:"Jamming (interferencia intencional)", body:`<p>El jamming satura el receptor con ruido o señal competidora para degradar la relación señal-ruido del enlace legítimo por debajo del umbral demodulable. Tipos conceptuales:</p><ul><li><b>Barrage:</b> ruido de banda ancha sobre todo el canal.</li><li><b>Spot:</b> energía concentrada en una frecuencia específica.</li><li><b>Sweep:</b> barrido a través de un rango de frecuencias.</li></ul>`,
 kc:{cap:"Efecto y detección · nivel conceptual", heads:["Aspecto","Descripción"], rows:[
   ["Manifestación","Caída súbita de SNR y aumento de la tasa de error (BER) en el enlace afectado.","—"],
   ["Detección","Monitoreo de espectro que revela energía anómala; correlación entre pérdida de servicio y niveles de RF.","—"],
   ["Mitigación","Salto de frecuencia (frequency hopping), antenas direccionales, márgenes de enlace amplios, geolocalización de la fuente.","—"]
 ]},
 call:{type:"def", lead:"Lección para threat modeling:", txt:"El link budget del módulo RF define cuánta interferencia soporta un enlace. Un margen de desvanecimiento amplio y las técnicas anti-jam son los controles que se modelan aquí."}},
 {id:"phy-spoofing", des:"PHY-03", title:"Spoofing y meaconing de GNSS", body:`<p>Las señales de GPS/GNSS son muy débiles y, en su forma civil, sin autenticación fuerte — lo que las hace un objetivo clásico de la capa física.</p><ul><li><b>Spoofing:</b> emisión de señales GNSS falsas que inducen una posición u hora incorrecta en el receptor.</li><li><b>Meaconing:</b> retransmisión retardada de señales reales para confundir sincronización y posición.</li></ul><p>El impacto va más allá de la navegación: muchas infraestructuras (redes eléctricas, telecomunicaciones, finanzas) dependen de la <b>señal de tiempo</b> de GNSS.</p>`,
 kc:{cap:"Impacto y detección · nivel conceptual", heads:["Aspecto","Descripción"], rows:[
   ["Impacto","Posición u hora falsa propagada a sistemas dependientes del tiempo GNSS.","—"],
   ["Detección","Comprobaciones de plausibilidad (saltos imposibles de posición/tiempo), múltiples fuentes, monitoreo de potencia de señal anómala.","—"],
   ["Mitigación","Receptores con detección anti-spoofing, autenticación (ej. Galileo OSNMA), y fuentes de tiempo redundantes independientes de GNSS.","—"]
 ]},
 call:{type:"warn", lead:"Alcance:", txt:"Este curso explica el fenómeno para poder detectarlo y mitigarlo. No cubre cómo generar señales falsas — emitir en bandas GNSS sin autorización es ilegal y peligroso para infraestructura crítica."},
 quiz:{q:"¿Por qué el spoofing de GNSS puede afectar a infraestructura que no es de navegación?", opts:["Porque apaga los satélites","Porque muchos sistemas críticos dependen de la señal de tiempo de GNSS","Porque borra los datos del receptor"], correct:1, fb:"GNSS es una fuente de tiempo de referencia para redes eléctricas, telecom y finanzas; falsear el tiempo puede desestabilizar sistemas que nada tienen que ver con la navegación."}},
 {id:"phy-spectrum", des:"PHY-04", title:"Interferencia no intencional y gestión del espectro", body:`<p>No toda interferencia es un ataque. Configuraciones erróneas, armónicos, terminales VSAT mal apuntados o solapamiento de bandas causan interferencia no intencional constantemente. Para un analista, distinguir un ataque de un fallo de configuración es parte esencial del trabajo, y por eso la gestión y el monitoreo del espectro son una capacidad defensiva de primer orden.</p>`,
 quiz:{q:"Ante una degradación de señal, ¿qué debe determinar primero un analista?", opts:["Si es interferencia intencional (ataque) o no intencional (configuración/clima)","El color de la antena","La marca del satélite"], correct:0, fb:"Distinguir ataque de fallo o clima es el primer paso; determina si la respuesta es de seguridad o de operaciones."}}
]},
{title:"Criptografía de enlace", code:"CRY", lessons:[
 {id:"cry-why", des:"CRY-01", title:"Por qué cifrar el enlace espacial", body:`<p>El enlace satelital es un medio abierto: cualquiera dentro del alcance puede recibir la señal. La criptografía aporta tres garantías distintas, y confundirlas es un error común:</p><ul><li><b>Confidencialidad:</b> que un tercero no lea el contenido (cifrado).</li><li><b>Integridad y autenticación:</b> que un comando provenga de quien dice y no haya sido alterado.</li><li><b>Anti-replay:</b> que un comando legítimo capturado no pueda reenviarse después.</li></ul>`,
 call:{type:"def", lead:"El punto clave:", txt:"En los casos de estudio, el fallo casi nunca fue de confidencialidad, sino de autenticación de comandos y anti-replay. Cifrar no basta si no se autentica el origen."}},
 {id:"cry-sdls", des:"CRY-02", title:"SDLS: seguridad a nivel de enlace", body:`<p>El estándar <b>SDLS</b> (Space Data Link Security) del CCSDS asegura las tramas de comando y telemetría. Ofrece autenticación, cifrado o ambos según la configuración, aplicados directamente sobre el frame del enlace. Es la contramedida estandarizada frente a inyección o alteración de comandos.</p>`},
 {id:"cry-keys", des:"CRY-03", title:"Gestión de claves en el espacio", body:`<p>El reto no es solo el algoritmo, sino la <b>gestión de claves</b> a lo largo de misiones que duran años o décadas:</p><ul><li>Rotación de claves (rekeying) sobre un enlace intermitente y de baja capacidad.</li><li>Almacenamiento seguro en hardware que no se puede reemplazar una vez lanzado.</li><li>Consideraciones a futuro, como la resistencia a la computación cuántica en misiones de larga vida.</li></ul>`,
 quiz:{q:"En los casos de estudio del curso, ¿qué garantía criptográfica falló con más frecuencia?", opts:["La confidencialidad (cifrado del contenido)","La autenticación de comandos y el anti-replay","La compresión de datos"], correct:1, fb:"El patrón repetido fue la falta de autenticación de origen y protección anti-replay en el plano de comando, no la ausencia de cifrado."}}
]},
{title:"Marcos de defensa", code:"DEF", lessons:[
 {id:"cisa", des:"DEF-01", title:"CISA · SpaDoCS · TREKS", body:`<p><b>CISA:</b> guías de riesgo de cadena de suministro, segmentación y respuesta a incidentes para operadores espaciales. <b>SpaDoCS:</b> estandarización de requisitos de ciberseguridad en el ciclo de vida de la misión. <b>TREKS:</b> evaluación de riesgo y trazabilidad de amenazas para priorizar controles por impacto real.</p>`},
 {id:"sparta", des:"DEF-02", title:"MITRE SPARTA para diseño de engagements", body:`<p>SPARTA es una matriz pública de tácticas y técnicas conocidas contra sistemas espaciales — el vocabulario común entre red team y blue team. Al diseñar un engagement autorizado, el red teamer selecciona qué tácticas son relevantes para el alcance acordado, y el blue team usa la misma matriz para verificar cobertura de detección.</p>`,
 kc:{cap:"Tácticas SPARTA · lectura defensiva", heads:["Táctica","Lectura para el defensor"], rows:[
   ["Recon","Qué información pública debería minimizarse o monitorearse.","—"],
   ["Initial access","Qué puntos de entrada al plano de gestión o enlace necesitan autenticación fuerte.","—"],
   ["Impact","Qué activos, si se degradan, generan el mayor impacto operacional.","—"]
 ]},
 call:{type:"info", lead:"Uso previsto:", txt:"La matriz cataloga categorías; no sustituye la autorización, el alcance ni las reglas de enfrentamiento de un engagement real."}},
 {id:"anomaly", des:"DEF-03", title:"Lab: detección de anomalías", body:`<p>Dado un conjunto simplificado de telemetría (temperatura, voltaje de batería, orientación), identifica qué lecturas se desvían del rango esperado y qué protocolo de respuesta corresponde según SPARTA.</p>`,
 quiz:{q:"¿Cuál es el propósito principal de MITRE SPARTA?", opts:["Enseñar a explotar satélites paso a paso","Catalogar tácticas para que los defensores mapeen controles","Vender hardware satelital"], correct:1, fb:"Es una herramienta de referencia para equipos defensivos, no un manual de ataque."}}
]},
{title:"Evaluación final", code:"CTF", lessons:[
 {id:"ctf", des:"CTF-00", title:"CTF de detección y respuesta", body:`<p>El reto integra logs de telemetría, tráfico de red y sesiones de protocolo simulados. Debes identificar y clasificar el tipo de incidente (interferencia, anomalía de subsistema, patrón de DDoS, acceso no autorizado) y proponer el framework de respuesta aplicable.</p>`,
 call:{type:"def", lead:"Estilo blue team:", txt:"Ganas puntos por identificar y clasificar correctamente incidentes sobre datos simulados, no por comprometer sistemas."},
 quiz:{q:"¿Qué tipo de CTF es el reto final?", opts:["Ofensivo, contra satélites reales","De detección y respuesta sobre datos simulados","Trivia sin relación con satélites"], correct:1, fb:"Todo el curso forma capacidad defensiva; el CTF final refleja ese enfoque."}}
]}
];

const flat=[];
course.forEach((m,mi)=>m.lessons.forEach((l,li)=>flat.push({...l,mi,li,mod:m.title,mcode:m.code})));

const KEY='satcom_course_progress_v1';
let done=new Set();
try{const s=localStorage.getItem(KEY);if(s)done=new Set(JSON.parse(s));}catch(e){}
let current=0;
try{const c=localStorage.getItem(KEY+'_pos');if(c!==null)current=Math.min(+c,flat.length-1);}catch(e){}

function save(){try{localStorage.setItem(KEY,JSON.stringify([...done]));localStorage.setItem(KEY+'_pos',current);}catch(e){}}

function esc(s){return s;}

function updateRing(){
  const pct=Math.round(done.size/flat.length*100);
  document.getElementById('pctTxt').textContent=pct+'%';
  document.getElementById('cntTxt').textContent=done.size+' / '+flat.length;
  const c=2*Math.PI*16;
  document.getElementById('ringFill').style.strokeDasharray=c;
  document.getElementById('ringFill').style.strokeDashoffset=c*(1-pct/100);
}

function buildNav(){
  const nav=document.getElementById('nav');
  let html='<div class="nav-head">Manifiesto de misión</div>';
  course.forEach((m,mi)=>{
    html+='<div class="mod"><div class="mod-t"><span class="idx">'+m.code+'</span>'+m.title+'</div>';
    m.lessons.forEach((l)=>{
      const idx=flat.findIndex(f=>f.id===l.id);
      html+='<button class="les'+(idx===current?' active':'')+(done.has(l.id)?' done':'')+'" data-i="'+idx+'">'
        +'<span class="node"></span><span class="num">'+String(idx+1).padStart(2,'0')+'</span><span>'+l.title+'</span></button>';
    });
    html+='</div>';
  });
  nav.innerHTML=html;
  nav.querySelectorAll('.les').forEach(b=>b.onclick=()=>{current=+b.dataset.i;render();closeDrawer();window.scrollTo(0,0);});
}

function kcHtml(kc){
  let h='<div class="kc"><div class="kc-cap">'+kc.cap+'</div>';
  const hasThird=kc.rows.some(r=>r[2]&&r[2]!=='—');
  const hd=kc.heads||['Fase','Objetivo del atacante','Debilidad aprovechada'];
  h+='<div class="kc-row kc-hd"><div class="ph">'+hd[0]+'</div><div class="c">'+hd[1]+'</div>'+(hasThird?'<div class="c">'+hd[2]+'</div>':'<div class="c"></div>')+'</div>';
  kc.rows.forEach(r=>{
    h+='<div class="kc-row"><div class="ph">'+r[0]+'</div><div class="c">'+r[1]+'</div><div class="c">'+(r[2]==='—'?'<span style="color:var(--ink-3)">—</span>':r[2])+'</div></div>';
  });
  return h+'</div>';
}

function callHtml(c){
  const ic={info:'◈',warn:'⚠',def:'◆'}[c.type];
  return '<div class="call '+c.type+'"><div class="ic">'+ic+'</div><div>'+(c.lead?'<span class="lead">'+c.lead+'</span> ':'')+c.txt+'</div></div>';
}

function render(){
  buildNav();
  const l=flat[current];
  const m=document.getElementById('main');
  let h='<div class="crumb">'+l.mcode+' · Lección '+String(current+1).padStart(2,'0')+' de '+String(flat.length).padStart(2,'0')+'</div>';
  h+='<div class="desig"><span class="dot"></span>'+l.des+'</div>';
  h+='<h1>'+l.title+'</h1><div class="body">'+l.body;
  if(l.kc)h+=kcHtml(l.kc);
  if(l.call)h+=callHtml(l.call);
  h+='</div>';
  if(l.quiz){
    h+='<div class="quiz"><div class="quiz-k">Verificación de conocimiento</div><div class="quiz-q">'+l.quiz.q+'</div>';
    l.quiz.opts.forEach((o,i)=>{h+='<button class="opt" data-o="'+i+'"><span class="tag">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span></button>';});
    h+='<div id="fbSlot"></div></div>';
  }
  h+='<div class="pager"><button class="pg" id="prev"'+(current===0?' disabled':'')+'>‹ Anterior</button>'
    +'<button class="pg next" id="next">'+(current===flat.length-1?'Completar curso':'Siguiente ›')+'</button></div>';
  m.innerHTML=h;

  if(l.quiz){
    const q=l.quiz;
    m.querySelectorAll('.opt').forEach(btn=>{
      btn.onclick=()=>{
        m.querySelectorAll('.opt').forEach((el,ei)=>{el.disabled=true;if(ei===q.correct)el.classList.add('correct');else if(ei===+btn.dataset.o)el.classList.add('wrong');});
        document.getElementById('fbSlot').innerHTML='<div class="fb"><span class="ic">›</span><span>'+q.fb+'</span></div>';
        markDone(l.id);
      };
    });
  } else {
    markDone(l.id);
  }
  document.getElementById('prev').onclick=()=>{if(current>0){current--;render();window.scrollTo(0,0);}};
  document.getElementById('next').onclick=()=>{if(current<flat.length-1){current++;render();window.scrollTo(0,0);}else{markDone(l.id);}};
  updateRing();save();
}

function markDone(id){
  if(!done.has(id)){done.add(id);save();
    const idx=flat.findIndex(f=>f.id===id);
    const btn=document.querySelector('.les[data-i="'+idx+'"]');if(btn)btn.classList.add('done');
    updateRing();
  }
}

/* drawer */
const nav=document.getElementById('nav'),scrim=document.getElementById('scrim');
function openDrawer(){nav.classList.add('open');scrim.classList.add('show');}
function closeDrawer(){nav.classList.remove('open');scrim.classList.remove('show');}
document.getElementById('menuBtn').onclick=()=>nav.classList.contains('open')?closeDrawer():openDrawer();
scrim.onclick=closeDrawer;

render();
</script>
</body>
</html>
